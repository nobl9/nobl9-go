apiVersion: n9/v1alpha
kind: Direct
metadata:
  name: click-house
  displayName: Click House Direct
  project: default
  annotations:
    area: latency
    env: prod
    region: us
    team: sales
spec:
  description: Example Click House Direct
  releaseChannel: beta
  clickHouse:
    url: https://clickhouse.example.com:8443
    database: observability
    username: readonly_slo
    password: "[secret]"
  historicalDataRetrieval:
    maxDuration:
      value: 30
      unit: Day
    defaultDuration:
      value: 15
      unit: Day
  queryDelay:
    value: 31
    unit: Second
