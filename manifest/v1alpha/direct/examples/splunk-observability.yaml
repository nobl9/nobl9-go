apiVersion: n9/v1alpha
kind: Direct
metadata:
  name: splunk-observability
  displayName: Splunk Observability Direct
  project: default
  annotations:
    area: latency
    env: prod
    region: us
    team: sales
spec:
  description: Example Splunk Observability Direct
  releaseChannel: beta
  splunkObservability:
    realm: us1
    accessToken: "[secret]"
  historicalDataRetrieval:
    maxDuration:
      value: 30
      unit: Day
    defaultDuration:
      value: 15
      unit: Day
  queryDelay:
    value: 6
    unit: Minute
